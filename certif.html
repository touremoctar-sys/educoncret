<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConcret Certif PRO | Expert Audit Automatisé</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0e0c0a;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --cream: #fbf9f6;
            --white: #ffffff;
            --red: #c75a3a;
            --teal: #2a7b6e;
            --shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--ink); overflow-x: hidden; }

        /* HEADER PREMIUM */
        .premium-nav {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            padding: 1rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0; z-index: 1000;
        }

        .logo { font-family: 'Fraunces'; font-weight: 900; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
        .logo span { color: var(--gold); }

        /* LAYOUT */
        .main-container { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }

        .sidebar {
            background: var(--white);
            padding: 3rem 1.5rem;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .menu-item {
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            color: #666;
        }

        .menu-item:hover { background: var(--cream); color: var(--ink); }
        .menu-item.active { background: var(--ink); color: var(--white); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* CONTENT */
        .content { padding: 4rem; max-width: 1200px; }

        /* DASHBOARD CARDS */
        .top-stats { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1.5rem; margin-bottom: 3rem; }
        
        .main-card {
            background: var(--ink);
            color: white;
            padding: 3rem;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .main-card h2 { font-family: 'Fraunces'; font-size: 2.5rem; margin-bottom: 1rem; }
        .probability-tag { font-size: 0.8rem; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        .stat-box {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-number { font-family: 'Fraunces'; font-size: 2.5rem; font-weight: 900; display: block; }

        /* AUDIT INTERFACE */
        .audit-list { display: grid; gap: 1rem; }
        .indicator-card {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .indicator-card:hover { transform: scale(1.02); border-color: var(--gold); box-shadow: var(--shadow); }

        .status-badge {
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            background: #f0f0f0;
        }

        .status-badge.critical { background: #fff1f0; color: var(--red); }
        .status-badge.success { background: #f0f9f7; color: var(--teal); }

        /* CTA BUTTON */
        .btn-upgrade {
            background: var(--gold);
            color: var(--ink);
            padding: 1rem 2rem;
            border-radius: 99px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-upgrade:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(201,168,76,0.3); }

        /* IA SCAN ANIMATION */
        #ia-loader { display: none; margin-top: 2rem; }
        .scan-line { width: 100%; height: 2px; background: var(--gold); position: relative; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 50% { top: 50px; } 100% { top: 0; } }

    </style>
</head>
<body>

<nav class="premium-nav">
    <div class="logo">EduConcret <span>Certif PRO</span></div>
    <a href="#" class="btn-upgrade" onclick="triggerSales()">ACTIVER LA LICENCE COMPLÈTE</a>
</nav>

<div class="main-container">
    <aside class="sidebar">
        <div class="menu-item active" onclick="showView('dashboard')">📊 Pilotage Global</div>
        <div class="menu-item" onclick="showView('audit')">🔍 Audit Contradictoire</div>
        <div class="menu-item" onclick="showView('ia')">🤖 IA DeepScan™</div>
        <div class="menu-item" onclick="showView('docs')">📁 Coffre de Preuves</div>
        <div class="menu-item" onclick="showView('rncp')">📘 Workspace RNCP</div>
    </aside>

    <main class="content" id="render-area">
        </main>
</div>

<script>
    const data = {
        probabilite: 64,
        manquants: 12,
        docs: 84,
        indicators: [
            { id: 1, code: 'Q1.1', label: 'Diffusion de l\'Offre', status: 'critical', score: 20 },
            { id: 2, code: 'Q2.2', label: 'Parcours Handicap', status: 'critical', score: 10 },
            { id: 3, code: 'Q3.1', label: 'Objectifs Pédagogiques', status: 'success', score: 100 },
            { id: 4, code: 'Q6.4', label: 'Preuves d\'Assiduité', status: 'critical', score: 45 }
        ]
    };

    function renderDashboard() {
        return `
            <div class="top-stats">
                <div class="main-card">
                    <span class="probability-tag">Fiabilité Audit Blanc</span>
                    <h2>Probabilité de réussite : ${data.probabilite}%</h2>
                    <p style="opacity: 0.7; margin-bottom: 2rem;">Votre dossier présente 4 non-conformités majeures détectées par l'IA.</p>
                    <button class="btn-upgrade" style="background: white;" onclick="runAudit()">LANCER L'ANALYSE FINALE</button>
                </div>
                <div class="stat-box">
                    <span style="font-size: 0.8rem; font-weight: 700; opacity: 0.5;">PREUVES</span>
                    <span class="stat-number">${data.docs}</span>
                    <small>+3 aujourd'hui</small>
                </div>
                <div class="stat-box">
                    <span style="font-size: 0.8rem; font-weight: 700; opacity: 0.5;">MANQUANTS</span>
                    <span class="stat-number" style="color:var(--red)">${data.manquants}</span>
                    <small>Urgence Haute</small>
                </div>
            </div>

            <h3 style="font-family: Fraunces; font-size: 1.8rem; margin-bottom: 1.5rem;">Feuille de Route Prioritaire</h3>
            <div class="audit-list">
                ${data.indicators.map(i => `
                    <div class="indicator-card" onclick="boost(${i.id})">
                        <div>
                            <span style="font-weight: 900; color: var(--gold);">${i.code}</span>
                            <span style="margin-left: 15px; font-weight: 600;">${i.label}</span>
                        </div>
                        <div style="display: flex; align-items:center; gap: 20px;">
                            <span class="status-badge ${i.status}">${i.score}%</span>
                            <span style="font-size: 1.2rem;">→</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderIA() {
        return `
            <h2 style="font-family: Fraunces; font-size: 2.5rem; margin-bottom: 1rem;">DeepScan™ AI</h2>
            <p style="margin-bottom: 3rem; opacity: 0.6;">Glissez vos documents (PDF/DOCX) pour une vérification de conformité sémantique instantanée.</p>
            <div style="border: 2px dashed var(--gold); border-radius: 40px; padding: 5rem; text-align: center; background: white;" onclick="simulateScan()">
                <div style="font-size: 4rem; margin-bottom: 1rem;">📤</div>
                <p><strong>Cliquez ou déposez vos preuves ici</strong></p>
                <div id="ia-loader">
                    <div class="scan-line"></div>
                    <p style="margin-top: 1rem; font-weight: 700;">L'IA vérifie les 32 indicateurs...</p>
                </div>
                <div id="ia-report" style="display:none; margin-top: 2rem; text-align: left; background: var(--cream); padding: 2rem; border-radius: 20px;">
                    <h4 style="color: var(--red);">Rapport de Non-Conformité :</h4>
                    <ul style="margin-top: 1rem; font-size: 0.9rem;">
                        <li>❌ Q1.1 : Manque les mentions légales des tarifs TTC.</li>
                        <li>❌ Q2.2 : Le contact du référent handicap n'est pas identifié.</li>
                    </ul>
                </div>
            </div>
        `;
    }

    function simulateScan() {
        document.getElementById('ia-loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('ia-loader').style.display = 'none';
            document.getElementById('ia-report').style.display = 'block';
            alert("Alerte : 2 Non-conformités majeures identifiées !");
        }, 2500);
    }

    function triggerSales() {
        alert("Félicitations ! Vous allez être redirigé vers le formulaire d'activation de votre licence EduConcret Certif PRO.");
    }

    function showView(view) {
        const area = document.getElementById('render-area');
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        if(view === 'dashboard') area.innerHTML = renderDashboard();
        if(view === 'ia') area.innerHTML = renderIA();
        if(view === 'audit' || view === 'docs' || view === 'rncp') {
            area.innerHTML = `<h2>Module ${view.toUpperCase()} réservé aux abonnés</h2><p style="margin-top: 2rem;">Veuillez activer votre licence pour débloquer ce module.</p>`;
        }
    }

    function boost(id) {
        const ind = data.indicators.find(i => i.id === id);
        if(ind.score < 100) {
            ind.score = 100;
            ind.status = 'success';
            data.probabilite += 5;
            showView('dashboard');
            alert(`L'indicateur ${ind.code} est désormais conforme ! Votre probabilité de réussite augmente.`);
        }
    }

    // Init
    document.getElementById('render-area').innerHTML = renderDashboard();
</script>

</body>
</html>
