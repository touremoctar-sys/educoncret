<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EduConcret Certif — Audit Blanc Professionnel | Démo Qualiopi & RNCP</title>
  <meta name="description" content="Démo interactive de l'application EduConcret Certif : audit blanc Qualiopi complet avec score, recommandations, plan d'action et preuves. Vraie simulation d'audit.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f7f3ed; font-family: 'DM Sans', sans-serif; color: #0e0c0a; line-height: 1.5; }
    :root {
      --ink: #0e0c0a; --gold: #c9a84c; --gold-light: #e8c96a;
      --cream: #f7f3ed; --cream-2: #efe9df; --terracotta: #c75a3a;
      --teal: #2a7b6e; --lavender: #5c4d8a; --red: #c75a3a;
    }
    .app-container { max-width: 1400px; margin: 0 auto; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    .back-bar { background: #e5ddd0; padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid #d9cfc0; }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 600; color: #2e2b26; background: white; padding: 0.4rem 1rem; border-radius: 999px; transition: 0.2s; }
    .back-link:hover { background: var(--gold); color: var(--ink); }
    .app-nav { background: #fffdf9; border-bottom: 1px solid #e5ddd0; padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 20; backdrop-filter: blur(12px); background: rgba(255,253,249,0.96); }
    .logo-area { display: flex; align-items: center; gap: 0.7rem; font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.35rem; }
    .brand-dot { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 4px rgba(201,168,76,0.2); }
    .demo-badge { background: rgba(199,90,58,0.12); padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700; color: #9f3c20; }
    .nav-actions { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .btn-app { padding: 0.5rem 1.2rem; border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.2s; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; border: none; font-family: inherit; }
    .btn-outline-app { border: 1.5px solid #e5ddd0; background: white; color: var(--ink); }
    .btn-outline-app:hover { background: #f7f3ed; border-color: var(--gold); }
    .btn-primary-app { background: var(--gold); color: var(--ink); }
    .btn-primary-app:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-audit { background: var(--teal); color: white; }
    .btn-audit:hover { background: #1e6b5e; transform: translateY(-1px); }
    .main-layout { display: flex; flex: 1; }
    .sidebar { width: 260px; background: #fffdf9; border-right: 1px solid #e5ddd0; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .sidebar-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1rem; border-radius: 16px; font-weight: 500; color: #2e2b26; cursor: pointer; transition: all 0.15s; }
    .sidebar-item.active { background: rgba(201,168,76,0.12); color: #8d6b12; font-weight: 600; border-left: 3px solid var(--gold); }
    .sidebar-item:hover:not(.active) { background: #f1ede7; }
    .content { flex: 1; padding: 2rem 2rem 3rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 28px; padding: 1.3rem 1.2rem; border: 1px solid #e5ddd0; box-shadow: 0 8px 20px rgba(14,12,10,0.05); transition: 0.2s; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 800; margin-top: 0.3rem; }
    .score-badge { font-size: 0.9rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 999px; display: inline-block; margin-top: 0.5rem; }
    .score-critical { background: rgba(199,90,58,0.15); color: #b13e1f; }
    .score-medium { background: rgba(201,168,76,0.2); color: #8d6b12; }
    .score-good { background: rgba(42,123,110,0.12); color: #1a6458; }
    .indicator-grid, .action-grid { display: grid; gap: 1rem; }
    .indicator-item, .action-item { background: white; border-radius: 20px; padding: 1rem 1.2rem; border: 1px solid #e5ddd0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; transition: 0.15s; }
    .indicator-item { cursor: pointer; }
    .indicator-item:hover { background: #fffdf9; border-color: var(--gold); }
    .pill-status { font-size: 0.7rem; font-weight: 700; padding: 0.35rem 0.9rem; border-radius: 999px; }
    .pill.critical { background: rgba(199,90,58,0.12); color: #b13e1f; }
    .pill.warning { background: rgba(201,168,76,0.2); color: #8d6b12; }
    .pill.compliant { background: rgba(42,123,110,0.12); color: #1a6458; }
    .section-title { font-family: 'Fraunces', serif; font-size: 1.5rem; margin: 1.8rem 0 1rem 0; }
    .preuve-badge { background: #f1ede7; padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.7rem; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    hr { margin: 1.5rem 0; border: none; border-top: 1px solid #e5ddd0; }
    .audit-report { background: white; border-radius: 28px; padding: 1.8rem; border: 2px solid var(--gold); margin-top: 1rem; }
    .audit-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #e5ddd0; }
    .audit-score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--cream-2); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; font-family: 'Fraunces', serif; }
    .recommendation-item { background: #f7f3ed; border-radius: 16px; padding: 1rem; margin-bottom: 0.8rem; border-left: 4px solid var(--teal); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #0e0c0a; color: var(--gold); padding: 0.75rem 1.5rem; border-radius: 999px; font-size: 0.85rem; z-index: 1000; animation: fadeInOut 2s ease; pointer-events: none; }
    @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(-10px); } }
    @media (max-width: 780px) { .sidebar { display: none; } .content { padding: 1.5rem; } .app-nav, .back-bar { padding: 0.75rem 1rem; } }
    footer { background: #0e0c0a; color: rgba(247,243,237,0.6); text-align: center; padding: 1.5rem; font-size: 0.8rem; border-top: 1px solid rgba(201,168,76,0.15); }
    .progress-bar { height: 8px; background: #e5ddd0; border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: var(--teal); transition: width 0.3s; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="back-bar">
    <a href="https://educoncret.net/" class="back-link">← Retour à l'accueil EduConcret</a>
    <span style="color:#5a544d; font-size:0.8rem;">🎯 Audit Blanc Professionnel — Simulation réelle</span>
  </div>

  <div class="app-nav">
    <div class="logo-area"><span class="brand-dot"></span><span>EduConcret Certif</span><span class="demo-badge">AUDIT BLANC</span></div>
    <div class="nav-actions">
      <button class="btn-app btn-outline-app" id="resetBtn">🔄 Réinitialiser</button>
      <a href="https://educoncret.net/" class="btn-app btn-back">🏠 Retour au site</a>
      <button class="btn-app btn-primary-app" id="upgradeBtn">⭐ Offre Certification</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-item active" data-view="dashboard">📊 Tableau de bord</div>
      <div class="sidebar-item" data-view="qualiopi">✅ Qualiopi</div>
      <div class="sidebar-item" data-view="audit">🔍 Audit Blanc</div>
      <div class="sidebar-item" data-view="preuves">📁 Preuves</div>
      <div class="sidebar-item" data-view="actions">⚡ Plan d'action</div>
      <div class="sidebar-item" data-view="rncp">📘 RNCP</div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>

  <footer>
    <div style="max-width: 1200px; margin:0 auto;">
      EduConcret Certif · Audit Blanc Qualiopi · Simulation professionnelle
      <div class="footer-back" style="margin-top:0.5rem;"><a href="https://educoncret.net/" style="color:var(--gold);">← Retour à l'accueil</a></div>
    </div>
  </footer>
</div>

<script>
  // Base de données des indicateurs Qualiopi (32 indicateurs réels simplifiés)
  const allIndicators = [
    { id: 1, code: "Q1.1", name: "Information du public sur l'offre de formation", category: "Information", weight: 3 },
    { id: 2, code: "Q1.2", name: "Information sur les conditions de prise en charge", category: "Information", weight: 2 },
    { id: 3, code: "Q1.3", name: "Information sur les délais et modalités d'accès", category: "Information", weight: 2 },
    { id: 4, code: "Q2.1", name: "Adaptation aux publics spécifiques", category: "Accessibilité", weight: 3 },
    { id: 5, code: "Q2.2", name: "Référent handicap et accompagnement", category: "Accessibilité", weight: 3 },
    { id: 6, code: "Q2.3", name: "Accessibilité des locaux et ressources", category: "Accessibilité", weight: 2 },
    { id: 7, code: "Q3.1", name: "Suivi individuel et accompagnement", category: "Suivi", weight: 3 },
    { id: 8, code: "Q3.2", name: "Adaptation de la formation aux besoins", category: "Suivi", weight: 2 },
    { id: 9, code: "Q3.3", name: "Engagement et motivation des apprenants", category: "Suivi", weight: 2 },
    { id: 10, code: "Q4.1", name: "Modalités d'évaluation des acquis", category: "Évaluation", weight: 3 },
    { id: 11, code: "Q4.2", name: "Communication des résultats d'évaluation", category: "Évaluation", weight: 2 },
    { id: 12, code: "Q4.3", name: "Amélioration continue via les évaluations", category: "Évaluation", weight: 2 },
    { id: 13, code: "Q5.1", name: "Compétences des formateurs", category: "Ressources", weight: 3 },
    { id: 14, code: "Q5.2", name: "Veille et actualisation des compétences", category: "Ressources", weight: 2 },
    { id: 15, code: "Q6.1", name: "Satisfaction des parties prenantes", category: "Amélioration", weight: 2 },
    { id: 16, code: "Q6.2", name: "Traitement des réclamations", category: "Amélioration", weight: 2 }
  ];

  // État de l'application
  let appState = {
    indicators: allIndicators.map((ind, idx) => ({
      ...ind,
      status: idx < 4 ? "critical" : (idx < 8 ? "warning" : (idx < 12 ? "compliant" : "warning")),
      score: idx < 4 ? 20 : (idx < 8 ? 50 : (idx < 12 ? 85 : 45)),
      evidences: []
    })),
    actions: [
      { id: 1, title: "Finaliser le livret d'accueil et les modalités d'inscription", relatedIndicators: [1,2], priority: "high", status: "open", dueDate: "2026-04-15" },
      { id: 2, title: "Désigner un référent handicap et formaliser sa mission", relatedIndicators: [4,5], priority: "critical", status: "open", dueDate: "2026-03-30" },
      { id: 3, title: "Mettre en place une grille d'évaluation standardisée", relatedIndicators: [10,11], priority: "high", status: "open", dueDate: "2026-04-10" },
      { id: 4, title: "Former les formateurs à l'adaptation pédagogique", relatedIndicators: [8,13], priority: "medium", status: "open", dueDate: "2026-05-01" },
      { id: 5, title: "Créer un processus de traitement des réclamations", relatedIndicators: [16], priority: "medium", status: "open", dueDate: "2026-04-20" }
    ],
    evidences: [
      { name: "Livret_accueil_2026.pdf", type: "pdf", linkedTo: [1,2] },
      { name: "Processus_qualite_V2.docx", type: "doc", linkedTo: [7,10] },
      { name: "Grille_evaluation_2025.xlsx", type: "xlsx", linkedTo: [10] }
    ],
    lastAudit: null
  };

  let currentView = 'dashboard';

  // Calculer le score global
  function calculateGlobalScore() {
    let totalScore = 0;
    let totalWeight = 0;
    appState.indicators.forEach(ind => {
      totalScore += ind.score * ind.weight;
      totalWeight += ind.weight;
    });
    return Math.round(totalScore / totalWeight);
  }

  // Calculer le score par catégorie
  function getScoresByCategory() {
    const categories = {};
    appState.indicators.forEach(ind => {
      if (!categories[ind.category]) {
        categories[ind.category] = { total: 0, count: 0, weight: 0 };
      }
      categories[ind.category].total += ind.score;
      categories[ind.category].count++;
    });
    return categories;
  }

  // Lancer un audit blanc complet
  function runAuditBlanc() {
    const globalScore = calculateGlobalScore();
    const categories = getScoresByCategory();
    
    // Analyser les indicateurs critiques
    const criticalIndicators = appState.indicators.filter(ind => ind.score < 40);
    const warningIndicators = appState.indicators.filter(ind => ind.score >= 40 && ind.score < 70);
    const compliantIndicators = appState.indicators.filter(ind => ind.score >= 70);
    
    // Générer des recommandations intelligentes
    const recommendations = [];
    
    criticalIndicators.forEach(ind => {
      recommendations.push({
        indicator: ind,
        severity: "critical",
        message: `L'indicateur ${ind.code} - ${ind.name} présente un risque majeur de non-conformité. Score actuel : ${ind.score}/100.`,
        action: getActionForIndicator(ind)
      });
    });
    
    warningIndicators.slice(0, 5).forEach(ind => {
      recommendations.push({
        indicator: ind,
        severity: "warning",
        message: `${ind.code} - ${ind.name} nécessite une attention particulière. Score : ${ind.score}/100.`,
        action: getActionForIndicator(ind)
      });
    });
    
    // Ajouter des recommandations stratégiques
    if (globalScore < 50) {
      recommendations.push({
        indicator: null,
        severity: "critical",
        message: "Votre score global est critique. Une action immédiate sur les indicateurs Q1.1, Q2.2 et Q3.1 est nécessaire.",
        action: "Prioriser la création du livret d'accueil et la nomination d'un référent handicap"
      });
    } else if (globalScore < 75) {
      recommendations.push({
        indicator: null,
        severity: "warning",
        message: "Votre score est moyen. Concentrez-vous sur l'amélioration des preuves documentaires.",
        action: "Auditer vos processus de suivi individuel et d'évaluation des acquis"
      });
    }
    
    const auditReport = {
      date: new Date().toLocaleDateString('fr-FR'),
      globalScore: globalScore,
      totalIndicators: appState.indicators.length,
      criticalCount: criticalIndicators.length,
      warningCount: warningIndicators.length,
      compliantCount: compliantIndicators.length,
      recommendations: recommendations,
      categories: categories,
      criticalIndicators: criticalIndicators,
      warningIndicators: warningIndicators.slice(0, 8)
    };
    
    appState.lastAudit = auditReport;
    return auditReport;
  }

  function getActionForIndicator(indicator) {
    const actionMap = {
      1: "Rédiger un livret d'accueil complet avec toutes les informations obligatoires",
      2: "Créer une fiche d'information précontractuelle standardisée",
      4: "Désigner un référent handicap et former l'équipe",
      5: "Formaliser la procédure d'accompagnement handicap",
      7: "Mettre en place des entretiens individuels tracés",
      10: "Créer une grille d'évaluation critériée",
      16: "Instaurer un registre des réclamations et un délai de réponse"
    };
    return actionMap[indicator.id] || `Renforcer la documentation et les preuves pour ${indicator.code}`;
  }

  // Simuler l'amélioration d'un indicateur
  function improveIndicator(indicatorId) {
    const indicator = appState.indicators.find(i => i.id === indicatorId);
    if (indicator && indicator.score < 100) {
      const oldScore = indicator.score;
      indicator.score = Math.min(100, indicator.score + 25);
      indicator.status = indicator.score >= 70 ? "compliant" : (indicator.score >= 40 ? "warning" : "critical");
      
      // Créer automatiquement une preuve associée
      const newEvidence = {
        name: `Preuve_${indicator.code}_${new Date().toISOString().slice(0,10)}.pdf`,
        type: "pdf",
        linkedTo: [indicator.id],
        auto: true
      };
      appState.evidences.unshift(newEvidence);
      
      showToast(`✅ ${indicator.code} amélioré : ${oldScore} → ${indicator.score} points`);
      renderCurrentView();
    } else if (indicator && indicator.score >= 100) {
      showToast(`✅ ${indicator.code} est déjà conforme !`);
    }
  }

  function showToast(message) {
    const existing = document.querySelector('.toast');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // Rendu des différentes vues
  function renderDashboard() {
    const score = calculateGlobalScore();
    const openActions = appState.actions.filter(a => a.status === 'open').length;
    const criticalIndicators = appState.indicators.filter(i => i.score < 40).length;
    
    return `
      <div class="stats-row">
        <div class="stat-card"><div>📈 Score Qualiopi</div><div class="stat-value">${score}%</div><div class="score-badge ${score < 50 ? 'score-critical' : (score < 75 ? 'score-medium' : 'score-good')}">${score < 50 ? 'Critique' : (score < 75 ? 'À améliorer' : 'Bon niveau')}</div></div>
        <div class="stat-card"><div>⚠️ Indicateurs critiques</div><div class="stat-value">${criticalIndicators}</div><div>sur ${appState.indicators.length}</div></div>
        <div class="stat-card"><div>📋 Actions ouvertes</div><div class="stat-value">${openActions}</div><div>${appState.actions.filter(a => a.priority === 'critical').length} prioritaires</div></div>
        <div class="stat-card"><div>📎 Preuves documentées</div><div class="stat-value">${appState.evidences.length}</div><div>+${appState.evidences.filter(e => e.auto).length} auto-générées</div></div>
      </div>
      <div class="flex-between"><h2 class="section-title">📋 Indicateurs prioritaires</h2><button class="btn-app btn-audit" onclick="runAndShowAudit()">🔍 Lancer un audit blanc complet</button></div>
      <div class="indicator-grid">
        ${appState.indicators.filter(i => i.score < 70).slice(0, 6).map(i => `
          <div class="indicator-item" onclick="improveIndicator(${i.id})">
            <div><h4>${i.code} — ${i.name}</h4><div class="progress-bar" style="width:150px;"><div class="progress-fill" style="width:${i.score}%"></div></div><div class="indicator-desc" style="font-size:0.7rem;">Score : ${i.score}%</div></div>
            <span class="pill-status ${i.status}">${i.status === 'critical' ? 'À corriger d\'urgence' : (i.status === 'warning' ? 'À améliorer' : 'Conforme')}</span>
          </div>
        `).join('')}
      </div>
      ${appState.lastAudit ? `<div class="audit-report" style="margin-top:1rem;"><div class="flex-between"><strong>📊 Dernier audit : ${appState.lastAudit.date}</strong><span>Score global : ${appState.lastAudit.globalScore}%</span></div><div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:${appState.lastAudit.globalScore}%; background:var(--gold);"></div></div></div>` : ''}
    `;
  }

  function renderQualiopi() {
    return `
      <h2 class="section-title">✅ Indicateurs Qualiopi — détail par critère</h2>
      <div class="indicator-grid">
        ${appState.indicators.map(i => `
          <div class="indicator-item" onclick="improveIndicator(${i.id})">
            <div><h4>${i.code} — ${i.name}</h4><div class="indicator-desc">Catégorie : ${i.category} · Poids : ${i.weight}</div><div class="progress-bar" style="width:200px;"><div class="progress-fill" style="width:${i.score}%"></div></div></div>
            <div><span class="pill-status ${i.status}">${i.status === 'critical' ? 'Non conforme' : (i.status === 'warning' ? 'Partiel' : 'Conforme')}</span><div style="font-size:0.7rem; margin-top:0.3rem;">Score ${i.score}%</div></div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:1rem; background:#eae2d7; border-radius:20px; padding:1rem;"><strong>💡 Conseil :</strong> Cliquez sur un indicateur pour simuler son amélioration (ajout de preuves + augmentation du score).</div>
    `;
  }

  function renderAudit() {
    let audit = appState.lastAudit;
    if (!audit) {
      audit = runAuditBlanc();
    }
    return `
      <div class="flex-between"><h2 class="section-title">🔍 Audit Blanc Qualiopi</h2><button class="btn-app btn-audit" onclick="runAndShowAudit()">🔄 Relancer l'audit</button></div>
      <div class="audit-report">
        <div class="audit-header">
          <div><h3>Rapport d'audit interne</h3><p>Date : ${audit.date}</p><p>Auditeur : EduConcert Certif</p></div>
          <div class="audit-score-circle" style="background:${audit.globalScore < 50 ? '#f5e0d8' : (audit.globalScore < 75 ? '#f5edc5' : '#d5e8df')};">${audit.globalScore}%</div>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem;">
          <div style="text-align:center;"><span style="color:var(--red);">🔴 ${audit.criticalCount}</span><br>Critiques</div>
          <div style="text-align:center;"><span style="color:var(--gold);">🟠 ${audit.warningCount}</span><br>À surveiller</div>
          <div style="text-align:center;"><span style="color:var(--teal);">🟢 ${audit.compliantCount}</span><br>Conformes</div>
        </div>
        
        <h3>📋 Recommandations prioritaires</h3>
        ${audit.recommendations.slice(0, 6).map(rec => `
          <div class="recommendation-item" style="border-left-color: ${rec.severity === 'critical' ? 'var(--red)' : 'var(--gold)'};">
            <strong>${rec.severity === 'critical' ? '⚠️ URGENT' : '📌 À traiter'}</strong>
            <p style="margin: 0.5rem 0;">${rec.message}</p>
            <div style="font-size:0.8rem; color:var(--teal);">Action recommandée : ${rec.action}</div>
          </div>
        `).join('')}
        
        <div style="margin-top: 1.5rem; background: #f7f3ed; border-radius: 16px; padding: 1rem;">
          <strong>💼 Prestation d'accompagnement</strong>
          <p style="margin-top:0.5rem;">Sur la base de cet audit blanc, EduConcret propose un accompagnement personnalisé : plan d'action détaillé, rédaction des documents manquants, préparation à l'audit de certification.</p>
          <button class="btn-app btn-primary-app" style="margin-top:0.8rem;" onclick="showToast('Contactez-nous pour un accompagnement sur mesure : contact@educoncret.net')">📞 Demander un devis d'accompagnement</button>
        </div>
      </div>
    `;
  }

  function renderPreuves() {
    return `
      <div class="flex-between"><h2 class="section-title">📁 Coffre de preuves documentaires</h2><button class="btn-app btn-outline-app" onclick="showToast('Module complet disponible dans l\'offre Certification')">+ Ajouter un document</button></div>
      <div class="workspace-block" style="background:#fffdf9; border-radius:28px; padding:1.5rem; border:1px solid #e5ddd0;">
        ${appState.evidences.map(e => `
          <div style="background:white; border-radius:16px; padding:0.8rem 1rem; margin-bottom:0.5rem; border:1px solid #e5ddd0; display:flex; justify-content:space-between; align-items:center;">
            <span>📄 ${e.name}</span>
            <span class="preuve-badge">Lié à ${e.linkedTo.map(id => appState.indicators.find(i => i.id === id)?.code).filter(Boolean).join(', ')}</span>
          </div>
        `).join('')}
        <div style="margin-top:1rem; font-size:0.85rem; color:#5a544d;">💡 Stockage externe possible : Drive, Dropbox, OneDrive. L'application garde les métadonnées.</div>
      </div>
    `;
  }

  function renderActions() {
    return `
      <div class="flex-between"><h2 class="section-title">⚡ Plan d'action Qualiopi</h2><button class="btn-app btn-outline-app" onclick="showToast('Nouvelle action personnalisable')">+ Ajouter</button></div>
      <div class="action-grid">
        ${appState.actions.map(a => `
          <div class="action-item" onclick="showToast('Action corrective en cours de traitement')">
            <div><strong>${a.title}</strong><div style="font-size:0.75rem;">Échéance : ${a.dueDate} · Priorité ${a.priority === 'critical' ? 'Critique' : (a.priority === 'high' ? 'Haute' : 'Moyenne')}</div></div>
            <span class="pill-status ${a.status === 'open' ? 'warning' : 'compliant'}">${a.status === 'open' ? 'À traiter' : 'Réalisée'}</span>
          </div>
        `).join('')}
      </div>
      <div class="audit-report" style="margin-top:1.5rem; background:#f7f3ed;">
        <strong>📊 Suivi des actions correctives</strong>
        <div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:${(appState.actions.filter(a => a.status !== 'open').length / appState.actions.length) * 100}%; background:var(--teal);"></div></div>
        <p style="margin-top:0.5rem; font-size:0.85rem;">Taux d'avancement : ${Math.round((appState.actions.filter(a => a.status !== 'open').length / appState.actions.length) * 100)}%</p>
      </div>
    `;
  }

  function renderRNCP() {
    return `
      <h2 class="section-title">📘 RNCP Workspace</h2>
      <div class="workspace-block" style="background:#fffdf9; border-radius:28px; padding:1.5rem; border:1px solid #e5ddd0;">
        <div style="display:grid; gap:1rem;">
          <div style="background:white; border-radius:20px; padding:1rem; border-left:4px solid var(--lavender);">
            <strong>🧩 Bloc 1 — Conception de formation</strong>
            <div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:65%;"></div></div>
            <div style="font-size:0.8rem; margin-top:0.3rem;">Statut : Structure partielle · Manque : référentiel d'évaluation</div>
          </div>
          <div style="background:white; border-radius:20px; padding:1rem; border-left:4px solid var(--lavender);">
            <strong>🧩 Bloc 2 — Ingénierie pédagogique</strong>
            <div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:45%;"></div></div>
            <div style="font-size:0.8rem; margin-top:0.3rem;">Statut : En construction · Action liée : #4</div>
          </div>
          <div style="background:white; border-radius:20px; padding:1rem; border-left:4px solid var(--lavender);">
            <strong>🧩 Bloc 3 — Management qualité</strong>
            <div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:80%;"></div></div>
            <div style="font-size:0.8rem; margin-top:0.3rem;">Statut : Bien avancé</div>
          </div>
        </div>
        <button class="btn-app btn-primary-app" style="margin-top:1.5rem;" onclick="showToast('Export du dossier RNCP disponible dans l\'offre complète')">📎 Exporter le dossier RNCP</button>
      </div>
    `;
  }

  function runAndShowAudit() {
    runAuditBlanc();
    currentView = 'audit';
    renderCurrentView();
    showToast('✅ Audit blanc terminé ! Consultez le rapport détaillé.');
  }

  function renderCurrentView() {
    const contentDiv = document.getElementById('mainContent');
    switch(currentView) {
      case 'dashboard': contentDiv.innerHTML = renderDashboard(); break;
      case 'qualiopi': contentDiv.innerHTML = renderQualiopi(); break;
      case 'audit': contentDiv.innerHTML = renderAudit(); break;
      case 'preuves': contentDiv.innerHTML = renderPreuves(); break;
      case 'actions': contentDiv.innerHTML = renderActions(); break;
      case 'rncp': contentDiv.innerHTML = renderRNCP(); break;
      default: contentDiv.innerHTML = renderDashboard();
    }
    document.querySelectorAll('.sidebar-item').forEach(item => {
      if(item.dataset.view === currentView) item.classList.add('active');
      else item.classList.remove('active');
    });
  }

  function resetDemo() {
    appState.indicators = allIndicators.map((ind, idx) => ({
      ...ind,
      status: idx < 4 ? "critical" : (idx < 8 ? "warning" : (idx < 12 ? "compliant" : "warning")),
      score: idx < 4 ? 20 : (idx < 8 ? 50 : (idx < 12 ? 85 : 45)),
      evidences: []
    }));
    appState.actions.forEach(a => a.status = 'open');
    appState.evidences = [
      { name: "Livret_accueil_2026.pdf", type: "pdf", linkedTo: [1,2] },
      { name: "Processus_qualite_V2.docx", type: "doc", linkedTo: [7,10] },
      { name: "Grille_evaluation_2025.xlsx", type: "xlsx", linkedTo: [10] }
    ];
    appState.lastAudit = null;
    showToast('🔄 Démo réinitialisée');
    renderCurrentView();
  }

  // Événements
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      currentView = item.dataset.view;
      renderCurrentView();
    });
  });
  document.getElementById('resetBtn')?.addEventListener('click', resetDemo);
  document.getElementById('upgradeBtn')?.addEventListener('click', () => showToast('Contactez-nous pour l\'offre Certification : contact@educoncret.net'));
  
  window.improveIndicator = improveIndicator;
  window.runAndShowAudit = runAndShowAudit;
  window.showToast = showToast;

  renderCurrentView();
</script>
</body>
</html>
