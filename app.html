<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConcret Certif PRO | Excellence Audit & IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0e0c0a; --gold: #c9a84c; --gold-light: #e8c96a;
            --cream: #fbf9f6; --teal: #2a7b6e; --red: #c75a3a;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-premium: 0 20px 40px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--ink); overflow-x: hidden; }

        /* Navigation */
        .app-nav {
            background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 3rem; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .brand-dot { width: 14px; height: 14px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px rgba(201,168,76,0.4); }

        /* Layout */
        .main-layout { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 280px; background: white; padding: 3rem 1.5rem; 
            border-right: 1px solid rgba(0,0,0,0.05); position: sticky; 
            top: 75px; height: calc(100vh - 75px);
        }

        .sidebar-item {
            padding: 1rem 1.5rem; border-radius: 18px; margin-bottom: 8px;
            cursor: pointer; transition: 0.3s; display: flex;
            align-items: center; gap: 12px; font-weight: 500; color: rgba(14,12,10,0.6);
        }
        .sidebar-item:hover { background: var(--cream); color: var(--ink); transform: translateX(5px); }
        .sidebar-item.active { background: var(--ink); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .content { flex: 1; padding: 4rem; max-width: 1200px; }

        /* Stats & Dashboard */
        .stats-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 2rem; margin-bottom: 4rem; }
        .stat-card-main { background: var(--ink); color: white; border-radius: 32px; padding: 2.5rem; position: relative; overflow: hidden; }
        .stat-card { background: white; border-radius: 32px; padding: 2rem; border: 1px solid rgba(0,0,0,0.03); box-shadow: var(--shadow-premium); }
        .stat-value { font-family: 'Fraunces'; font-size: 3rem; font-weight: 900; margin: 0.5rem 0; }

        /* Indicators */
        .indicator-card {
            background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 1rem;
            border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; cursor: pointer;
        }
        .indicator-card:hover { border-color: var(--gold); transform: scale(1.01); }

        .check-list { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #f0f0f0; display: none; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; }

        .pill { padding: 6px 16px; border-radius: 999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .pill-red { background: #fff1f0; color: var(--red); }
        .pill-green { background: #f0f9f7; color: var(--teal); }

        /* Buttons */
        .btn-premium { background: var(--gold); color: var(--ink); padding: 0.8rem 2rem; border-radius: 999px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(201,168,76,0.3); }

        /* IA Scan */
        .scan-container { border: 2px dashed var(--gold); border-radius: 32px; padding: 4rem; text-align: center; background: white; cursor: pointer; }
        .scan-line { width: 100%; height: 2px; background: var(--gold); position: relative; animation: scanning 2s infinite; display: none; }
        @keyframes scanning { 0%, 100% { top: 0; } 50% { top: 100px; } }

        /* Toast */
        .toast { position: fixed; bottom: 40px; right: 40px; background: var(--ink); color: white; padding: 1rem 2rem; border-radius: 20px; z-index: 2000; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(100px); } to { transform: translateY(0); } }

        @media print { .sidebar, .app-nav, .btn-premium { display: none !important; } .content { padding: 0; } }
    </style>
</head>
<body>

<nav class="app-nav">
    <div class="logo-area"><div class="brand-dot"></div> EduConcret Certif PRO</div>
    <button class="btn-premium" onclick="showToast('⭐ Accès Illimité activé pour la démo')">ACTIVER LA LICENCE</button>
</nav>

<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-item active" onclick="switchTab('dashboard', this)">📊 Dashboard Global</div>
        <div class="sidebar-item" onclick="switchTab('qualiopi', this)">✅ Audit Qualiopi</div>
        <div class="sidebar-item" onclick="switchTab('ia', this)">🤖 IA DeepScan™</div>
        <div class="sidebar-item" onclick="switchTab('docs', this)">📁 Générateur de Preuves</div>
        <div class="sidebar-item" onclick="switchTab('settings', this)">⚙️ Configuration</div>
    </aside>

    <main class="content" id="view-container">
        </main>
</div>

<script>
    const state = {
        score: 64,
        docs: 142,
        warnings: 4,
        company: { name: "EduConcret Academy", manager: "Jean Expert", handicap: "Sophie Qualité" },
        indicators: [
            { id: 1, code: 'Q1.1', title: 'Diffusion de l\'Offre', val: 40, status: 'red', points: ["Tarifs affichés TTC", "Délais d'accès mentionnés", "Indicateurs de résultats"] },
            { id: 2, code: 'Q2.2', title: 'Référent Handicap', val: 15, status: 'red', points: ["Nom du référent identifié", "Protocole d'accueil PMR", "Partenaires spécialisés"] },
            { id: 3, code: 'Q3.1', title: 'Objectifs Pédagogiques', val: 95, status: 'green', points: ["Objectifs opérationnels", "Prérequis identifiés"] }
        ]
    };

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function renderDashboard() {
        return `
            <h1 style="font-family:Fraunces; font-size:2.5rem; margin-bottom:2.5rem;">Pilotage de Certification</h1>
            <div class="stats-row">
                <div class="stat-card-main">
                    <span style="text-transform:uppercase; font-size:0.7rem; letter-spacing:2px; color:var(--gold);">Fiabilité du Dossier</span>
                    <div class="stat-value" style="font-size:4rem;">${state.score}%</div>
                    <p style="opacity:0.7;">${state.score < 75 ? '⚠️ Risque de non-conformité majeure détecté.' : '✅ Dossier prêt pour l\'audit.'}</p>
                </div>
                <div class="stat-card">
                    <span style="opacity:0.6; font-weight:700;">Preuves</span>
                    <div class="stat-value">${state.docs}</div>
                    <span style="color:var(--teal); font-weight:800;">Conforme</span>
                </div>
                <div class="stat-card">
                    <span style="opacity:0.6; font-weight:700;">Alertes IA</span>
                    <div class="stat-value" style="color:var(--red)">${state.warnings}</div>
                    <span style="font-weight:700;">Critiques</span>
                </div>
            </div>
            
            <h2 style="font-family:Fraunces; margin-bottom:1.5rem;">Indicateurs Prioritaires</h2>
            ${state.indicators.map(i => `
                <div class="indicator-card" onclick="toggleCheck('${i.code}')">
                    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                        <div>
                            <strong><span style="color:var(--gold)">${i.code}</span> — ${i.title}</strong>
                            <div style="font-size:0.8rem; opacity:0.5;">Analyse IA : ${i.val < 50 ? 'Éléments manquants' : 'Cohérence validée'}</div>
                        </div>
                        <span class="pill ${i.val > 70 ? 'pill-green' : 'pill-red'}">${i.val}%</span>
                    </div>
                    <div class="check-list" id="check-${i.code}">
                        ${i.points.map(p => `<div class="check-item"><input type="checkbox" onchange="boost('${i.code}')"> ${p}</div>`).join('')}
                    </div>
                </div>
            `).join('')}
        `;
    }

    function renderIA() {
        return `
            <h2 style="font-family:Fraunces; font-size:2.2rem; margin-bottom:1.5rem;">DeepScan™ IA Deep Learning</h2>
            <div class="scan-container" onclick="startScan()">
                <div id="scan-ui">
                    <div style="font-size:4rem; margin-bottom:1.5rem;">📄</div>
                    <h3>Déposez vos documents de preuve</h3>
                    <p style="opacity:0.5; margin-top:1rem;">L'IA va scanner le texte pour valider les 32 indicateurs.</p>
                </div>
                <div class="scan-line" id="line"></div>
                <div id="scan-report" style="display:none; text-align:left; margin-top:2rem; background:var(--cream); padding:2rem; border-radius:20px;">
                    <h4 style="color:var(--red);">🚩 Non-Conformités Détectées :</h4>
                    <p style="margin-top:1rem; font-size:0.9rem;"><strong>Q1.1 :</strong> Manque les mentions légales sur les tarifs TTC.<br><strong>Q2.2 :</strong> Le contact du référent handicap n'est pas spécifié.</p>
                </div>
            </div>
        `;
    }

    function renderDocs() {
        return `
            <h2 style="font-family:Fraunces; font-size:2.2rem; margin-bottom:2rem;">Générateur de Preuves Dynamiques</h2>
            <div class="stat-card" style="margin-bottom:2rem;">
                <h4 style="margin-bottom:1rem;">Identité de l'Organisme</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <input type="text" placeholder="Nom Organisme" value="${state.company.name}" id="cName" style="padding:10px; border-radius:10px; border:1px solid #ddd;">
                    <input type="text" placeholder="Référent Handicap" value="${state.company.handicap}" id="cHandi" style="padding:10px; border-radius:10px; border:1px solid #ddd;">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
                <div class="indicator-card" onclick="genDoc('livret')">
                    <strong>📄 Livret d'Accueil</strong>
                    <p style="font-size:0.8rem; opacity:0.6;">Conforme Q1.1 et Q2.2</p>
                </div>
                <div class="indicator-card" onclick="genDoc('certificat')">
                    <strong>📄 Certificat de Réalisation</strong>
                    <p style="font-size:0.8rem; opacity:0.6;">Conforme Q6.4</p>
                </div>
            </div>
        `;
    }

    // --- Logic ---
    function toggleCheck(code) {
        const el = document.getElementById(`check-${code}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function boost(code) {
        const ind = state.indicators.find(i => i.code === code);
        ind.val = Math.min(100, ind.val + 15);
        state.score = Math.min(100, state.score + 2);
        showToast(`Mise en conformité de ${code} enregistrée.`);
        render('dashboard');
    }

    function startScan() {
        document.getElementById('scan-ui').style.opacity = '0.3';
        document.getElementById('line').style.display = 'block';
        setTimeout(() => {
            document.getElementById('line').style.display = 'none';
            document.getElementById('scan-report').style.display = 'block';
            showToast("⚠️ Analyse terminée : Anomalies détectées.");
        }, 2500);
    }

    function genDoc(type) {
        const n = document.getElementById('cName').value;
        const h = document.getElementById('cHandi').value;
        const win = window.open('', '_blank');
        win.document.write(`<html><body style="font-family:sans-serif; padding:50px;">
            <h1 style="color:#c9a84c;">${type === 'livret' ? "LIVRET D'ACCUEIL" : "CERTIFICAT DE RÉALISATION"}</h1>
            <p>Organisme : <strong>${n}</strong></p>
            <p>Référent Handicap : <strong>${h}</strong></p>
            <p style="margin-top:50px; font-size:0.8rem;">Document généré par EduConcret Certif PRO - Conforme Qualiopi V9</p>
            <script>window.print();<\/script>
        </body></html>`);
        win.document.close();
        showToast("Document généré avec succès.");
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(tab);
    }

    function render(tab) {
        const container = document.getElementById('view-container');
        if(tab === 'dashboard') container.innerHTML = renderDashboard();
        else if(tab === 'ia') container.innerHTML = renderIA();
        else if(tab === 'docs') container.innerHTML = renderDocs();
        else container.innerHTML = `<h1 style="font-family:Fraunces;">Module ${tab.toUpperCase()}</h1><p style="margin-top:2rem; opacity:0.5;">Bientôt disponible dans votre espace client.</p>`;
    }

    render('dashboard');
</script>
</body>
</html>
