<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConcret Certif PRO — Système Expert d'Audit Autonome</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0e0c0a; --gold: #c9a84c; --cream: #fbf9f6;
            --red: #c75a3a; --teal: #2a7b6e; --border: rgba(201, 168, 76, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--ink); }
        
        /* Layout Premium */
        .app-container { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        
        /* Sidebar Glassmorphism */
        .sidebar { background: #fff; border-right: 1px solid var(--border); padding: 2rem 1.5rem; position: sticky; top: 0; height: 100vh; }
        .logo { font-family: 'Fraunces'; font-weight: 900; font-size: 1.5rem; margin-bottom: 3rem; color: var(--ink); }
        .nav-item { padding: 1rem; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 0.5rem; font-weight: 500; color: #666; }
        .nav-item:hover { background: #f7f3ed; color: var(--ink); }
        .nav-item.active { background: var(--ink); color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Main Content */
        .content { padding: 4rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        
        /* Cards */
        .card { background: #fff; border-radius: 24px; padding: 2rem; border: 1px solid var(--border); margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .section-title { font-family: 'Fraunces'; font-size: 2rem; margin-bottom: 1.5rem; }

        /* Audit Grid */
        .audit-check-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #f0f0f0; }
        .audit-check-item:last-child { border: none; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--teal); cursor: pointer; margin-top: 3px; }

        /* Formulaire Dynamique */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: #888; }
        input[type="text"], textarea, select { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
        
        .btn-gold { background: var(--gold); color: #fff; border: none; padding: 1rem 2rem; border-radius: 999px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(201, 168, 76, 0.3); }

        .pill { padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
        .critical { background: #fff1f0; color: var(--red); }
        .success { background: #f0f9f7; color: var(--teal); }

        @media print { .sidebar, .btn-gold { display: none !important; } .content { padding: 0; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">EduConcret <span style="color:var(--gold)">PRO</span></div>
        <div class="nav-item active" onclick="navigate('audit', this)">🔍 Audit Contradictoire</div>
        <div class="nav-item" onclick="navigate('generator', this)">📄 Générateur de Preuves</div>
        <div class="nav-item" onclick="navigate('ia', this)">🤖 DeepScan IA</div>
        <div class="nav-item" onclick="navigate('settings', this)">⚙️ Configuration API</div>
        <hr style="margin: 2rem 0; opacity: 0.1;">
        <button class="btn-gold" style="width:100%" onclick="window.print()">Exporter l'Audit</button>
    </aside>

    <main class="content" id="mainRender">
        </main>
</div>

<script>
    // --- MOTEUR DE DONNÉES EXPERT ---
    const indicators = [
        { 
            code: "Q1.1", 
            name: "Information du Public", 
            checks: ["Tarifs TTC/HT affichés", "Indicateurs de résultats 2024", "Conditions d'accessibilité"],
            score: 0 
        },
        { 
            code: "Q2.2", 
            name: "Référent Handicap", 
            checks: ["Coordonnées du référent", "Liste partenaires spécialisés", "Livret d'accueil dédié"],
            score: 0 
        },
        { 
            code: "Q3.1", 
            name: "Objectifs de Formation", 
            checks: ["Objectifs évaluables", "Prérequis identifiés", "Contenu détaillé par module"],
            score: 0 
        }
    ];

    let appState = JSON.parse(localStorage.getItem('edu_expert_db')) || {
        indicators: indicators,
        company: { name: "", siren: "", manager: "", handicap: "Jean Expert" },
        apiKey: ""
    };

    function save() { localStorage.setItem('edu_expert_db', JSON.stringify(appState)); }

    // --- SYSTÈME DE NAVIGATION ---
    function navigate(view, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(view);
    }

    function render(view) {
        const root = document.getElementById('mainRender');
        root.innerHTML = '';

        if(view === 'audit') {
            root.innerHTML = `<h1 class="section-title">Audit Contradictoire Systémique</h1>`;
            appState.indicators.forEach(ind => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3 style="font-family:Fraunces">${ind.code} — ${ind.name}</h3>
                        <span class="pill ${ind.score === 100 ? 'success' : 'critical'}">${ind.score}% CONFORME</span>
                    </div>
                    ${ind.checks.map((check, i) => `
                        <div class="audit-check-item">
                            <input type="checkbox" ${ind.score === 100 ? 'checked' : ''} onchange="updateAuditScore('${ind.code}')">
                            <span>${check}</span>
                        </div>
                    `).join('')}
                `;
                root.appendChild(card);
            });
        }

        if(view === 'generator') {
            root.innerHTML = `
                <h1 class="section-title">Générateur de Preuves Dynamiques</h1>
                <div class="card">
                    <h4>Identité de l'Organisme</h4>
                    <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-top:1rem;">
                        <div><label>Nom de l'Organisme</label><input type="text" id="comp_name" value="${appState.company.name}" oninput="updateComp()"></div>
                        <div><label>Gérant / Responsable</label><input type="text" id="comp_manager" value="${appState.company.manager}" oninput="updateComp()"></div>
                    </div>
                    <div class="form-group">
                        <label>Référent Handicap</label>
                        <input type="text" id="comp_handicap" value="${appState.company.handicap}" oninput="updateComp()">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem;">
                    <div class="card" style="text-align:center">
                        <h3>Livret d'Accueil</h3>
                        <p style="font-size:0.8rem; margin:1rem 0; color:#666;">Génère un document de 4 pages conforme indicateurs 1.1 et 2.2.</p>
                        <button class="btn-gold" onclick="generatePDF('livret')">Générer le PDF</button>
                    </div>
                    <div class="card" style="text-align:center">
                        <h3>Fiche Programme</h3>
                        <p style="font-size:0.8rem; margin:1rem 0; color:#666;">Structure les objectifs et prérequis selon l'indicateur 3.1.</p>
                        <button class="btn-gold" onclick="generatePDF('programme')">Générer le PDF</button>
                    </div>
                </div>
            `;
        }

        if(view === 'ia') {
            root.innerHTML = `
                <h1 class="section-title">DeepScan IA : Analyse Contradictoire</h1>
                <div class="card" style="text-align:center; padding:5rem 2rem;">
                    <div style="font-size:4rem; margin-bottom:1rem;">🛰️</div>
                    <h2>Analyseur Haute Précision</h2>
                    <p style="margin-bottom:2rem; opacity:0.6;">L'IA va scanner votre document pour vérifier les 32 indicateurs Qualiopi.</p>
                    <input type="file" id="iaScan" style="display:none" onchange="runDeepScan()">
                    <button class="btn-gold" onclick="document.getElementById('iaScan').click()">Lancer le Scan de Preuves</button>
                    <div id="scanLog" style="margin-top:2rem;"></div>
                </div>
            `;
        }

        if(view === 'settings') {
            root.innerHTML = `
                <h1 class="section-title">Configuration Système</h1>
                <div class="card">
                    <label>Clé API OpenAI (Requis pour DeepScan)</label>
                    <input type="password" id="api_key" value="${appState.apiKey}" placeholder="sk-...">
                    <button class="btn-gold" style="margin-top:1rem;" onclick="saveSettings()">Mettre à jour la connexion</button>
                </div>
            `;
        }
    }

    // --- LOGIQUE MÉTIER ---
    function updateAuditScore(code) {
        const ind = appState.indicators.find(i => i.code === code);
        const card = event.target.closest('.card');
        const checks = card.querySelectorAll('input[type="checkbox"]');
        const checked = card.querySelectorAll('input[type="checkbox"]:checked');
        ind.score = Math.round((checked.length / checks.length) * 100);
        save();
        card.querySelector('.pill').innerText = ind.score + "% CONFORME";
        card.querySelector('.pill').className = `pill ${ind.score === 100 ? 'success' : 'critical'}`;
    }

    function updateComp() {
        appState.company.name = document.getElementById('comp_name').value;
        appState.company.manager = document.getElementById('comp_manager').value;
        appState.company.handicap = document.getElementById('comp_handicap').value;
        save();
    }

    function saveSettings() {
        appState.apiKey = document.getElementById('api_key').value;
        save();
        alert("Système mis à jour.");
    }

    function runDeepScan() {
        const log = document.getElementById('scanLog');
        log.innerHTML = `<div style="color:var(--gold)">⏳ Analyse sémantique en cours...</div>`;
        setTimeout(() => {
            log.innerHTML = `
                <div class="pill critical" style="display:block; padding:1.5rem; text-align:left;">
                    <strong>Résultat du Contrôle IA :</strong><br>
                    ❌ Indicateur 1.1 : Absence de mention des tarifs.<br>
                    ❌ Indicateur 2.2 : Coordonnées du référent handicap non détectées.<br>
                    ✅ Indicateur 3.1 : Objectifs pédagogiques conformes.
                </div>
            `;
        }, 2000);
    }

    function generatePDF(type) {
        if(!appState.company.name) return alert("Veuillez saisir le nom de votre organisme.");
        
        const win = window.open('', '_blank');
        const content = type === 'livret' ? `
            <h1>Livret d'Accueil Apprenant</h1>
            <hr>
            <p><strong>Organisme :</strong> ${appState.company.name}</p>
            <p><strong>Responsable :</strong> ${appState.company.manager}</p>
            <h2>Accessibilité Handicap</h2>
            <p>Notre référent handicap, <strong>${appState.company.handicap}</strong>, est à votre disposition pour adapter votre parcours.</p>
            <h2>Informations Pratiques</h2>
            <p>Le règlement intérieur est affiché dans nos locaux et consultable sur demande...</p>
        ` : `
            <h1>Fiche Programme de Formation</h1>
            <hr>
            <h2>1. Identification</h2>
            <p><strong>Organisme :</strong> ${appState.company.name}</p>
            <h2>2. Objectifs Pédagogiques</h2>
            <p>À l'issue de cette formation, l'apprenant sera capable de maîtriser les processus métiers...</p>
        `;

        win.document.write(`
            <html>
                <head>
                    <style>
                        body { font-family: sans-serif; padding: 50px; line-height: 1.6; color: #333; }
                        h1 { color: #c9a84c; text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; }
                        h2 { color: #2a7b6e; margin-top: 30px; }
                        strong { color: #000; }
                    </style>
                </head>
                <body onload="window.print()">
                    ${content}
                </body>
            </html>
        `);
        win.document.close();
    }

    // Initialisation
    render('audit');
</script>

</body>
</html>
